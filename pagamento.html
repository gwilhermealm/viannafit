<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Vianna Fit</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        .checkout-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--cor-primaria);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.8rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .radio-group {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .radio-group p {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .radio-option input {
            accent-color: var(--cor-secundaria);
        }

        .btn-finalizar {
            width: 100%;
            padding: 15px;
            background-color: var(--cor-secundaria);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-finalizar:hover {
            background-color: #d01201;
            transform: scale(1.02);
        }

        @media(max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
            .checkout-container { width: 90%; margin: 20px auto; }
        }
    </style>
</head>
<body>
    <header>
        <span class="material-symbols-outlined menu" onclick="window.location.href='index.html'">arrow_back</span>
        <span class="logo"><img src="imagens/logo-horizontal.png" alt="logo" style="width: 250px; height:auto;"></span>
    </header>

    <main class="checkout-container">
        <h2>Dados de Entrega</h2>
        <form id="form-checkout">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome aqui" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade" value="Pacatuba" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="grid-column: span 1.5;">
                    <label for="rua">Rua</label>
                    <input type="text" id="rua" name="rua" required>
                </div>
                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" id="numero" name="numero" required>
                </div>
            </div>

            <div class="radio-group">
                <p>Modelo de Entrega</p>
                <label class="radio-option">
                    <input type="radio" name="entrega" value="rota" checked>
                    Entrega Rota
                </label>
                <label class="radio-option">
                    <input type="radio" name="entrega" value="uber">
                    Uber Flash ⚡
                </label>
            </div>

            <div class="radio-group">
                <p>Forma de Pagamento</p>
                <label class="radio-option">
                    <input type="radio" name="pagamento" value="pix" checked>
                    PIX (Rápido e Seguro)
                </label>
                <label class="radio-option">
                    <input type="radio" name="pagamento" value="dinheiro">
                    Dinheiro
                </label>
            </div>

            <button type="submit" class="btn-finalizar">Confirmar Pedido</button>
        </form>
    </main>

    <script src="js/api-cep.js"></script>
</body>
</html>
