<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vianna Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c344c; }
        .login-card { background: white; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box;}
        .btn-login { width: 100%; padding: 12px; background: #fb1601; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>VIANNA ADMIN</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="******">
        </div>
        <button  onclick="handleLogin()" class="btn-login">Entrar</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config-supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await db.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                Swal.fire("Erro", "Usuário ou senha inválidos", "error");
            } else {
                window.location.href = "gerenciador.html";
            }
        }
    </script>
</body>
</html>
